; Overrides PHP defaults para CIO Dent.
; Permitimos payloads grandes para subir logos en base64 desde Configuración
; y para mover imágenes/firmas dentro de consents/odontogramas.

memory_limit = 512M
post_max_size = 30M
upload_max_filesize = 25M
max_input_time = 300
max_execution_time = 300

; Zona horaria default — el branding del tenant puede sobreescribir en runtime.
date.timezone = America/Mexico_City
