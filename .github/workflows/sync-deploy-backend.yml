name: Sync deploy-backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  sync:
    name: Push backend/ → deploy-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout con historial completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar subtree backend → deploy-backend
        run: |
          git subtree push --prefix=backend origin deploy-backend
