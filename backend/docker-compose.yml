name: amara

services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: amara_backend
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ciodent
      DB_USERNAME: ciodent
      DB_PASSWORD: ciodent
    depends_on:
      db:
        condition: service_healthy
    networks:
      - amara

  db:
    image: mysql:8.0
    container_name: amara_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ciodent
      MYSQL_USER: ciodent
      MYSQL_PASSWORD: ciodent
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - amara_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - amara

volumes:
  amara_db_data:

networks:
  amara:
    driver: bridge
